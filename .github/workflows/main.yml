name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Fetch build setup from official template
        run: |
          BASE=https://raw.githubusercontent.com/MeteorDevelopment/meteor-addon-template/master
          curl -sL $BASE/gradlew -o gradlew
          curl -sL $BASE/gradlew.bat -o gradlew.bat
          mkdir -p gradle/wrapper
          curl -sL $BASE/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          curl -sL $BASE/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -sL $BASE/build.gradle.kts -o build.gradle.kts
          curl -sL $BASE/settings.gradle.kts -o settings.gradle.kts
          curl -sL $BASE/gradle.properties -o gradle.properties
          curl -sL $BASE/gradle/libs.versions.toml -o gradle/libs.versions.toml
          chmod +x ./gradlew

      - name: Force Java 21 bytecode
        run: |
          mkdir -p gradle
          cat >> build.gradle.kts << 'EOF'

          tasks.withType<JavaCompile>().configureEach {
              options.release.set(21)
          }
          EOF

      - name: Build
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spawnerutils
          path: build/libs/
