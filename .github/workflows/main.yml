name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Fetch Gradle wrapper from official template
        run: |
          curl -sL https://raw.githubusercontent.com/MeteorDevelopment/meteor-addon-template/master/gradlew -o gradlew
          curl -sL https://raw.githubusercontent.com/MeteorDevelopment/meteor-addon-template/master/gradlew.bat -o gradlew.bat
          mkdir -p gradle/wrapper
          curl -sL https://raw.githubusercontent.com/MeteorDevelopment/meteor-addon-template/master/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          curl -sL https://raw.githubusercontent.com/MeteorDevelopment/meteor-addon-template/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spawnerutils
          path: build/libs/
