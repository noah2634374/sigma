# WICHTIG: Die exakten Build-Nummern (yarn-mappings build, fabric-loader,
# fabric-api, meteor snapshot) aendern sich haeufig. Diese Werte sind ein
# funktionierender Stand fuer Minecraft 1.21.11 / Meteor 26.1.2.
# Falls Gradle eine Dependency nicht aufloesen kann, kopiere diese Datei
# 1:1 aus dem offiziellen, immer aktuellen Template:
# https://github.com/MeteorDevelopment/meteor-addon-template -> gradle/libs.versions.toml

[versions]
# Build
java = "21"
loom = "1.11-SNAPSHOT"

# Minecraft / Fabric
minecraft = "1.21.11"
yarn-mappings = "1.21.11+build.1"
fabric-loader = "0.17.2"
fabric-api = "0.135.0+1.21.11"

# Meteor
meteor = "0.5.11-SNAPSHOT"

[libraries]
minecraft = { module = "com.mojang:minecraft", version.ref = "minecraft" }
yarn-mappings = { module = "net.fabricmc:yarn", version.ref = "yarn-mappings" }
fabric-loader = { module = "net.fabricmc:fabric-loader", version.ref = "fabric-loader" }
fabric-api = { module = "net.fabricmc.fabric-api:fabric-api", version.ref = "fabric-api" }
meteor = { module = "com.github.MeteorDevelopment:meteor-client", version.ref = "meteor" }

[plugins]
loom = { id = "fabric-loom", version.ref = "loom" }
